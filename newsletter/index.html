<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter — gianninspire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f7;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* ======= NAV ======= */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: rgba(0, 0, 0, 0.8);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .nav-logo {
      font-size: 17px;
      font-weight: 600;
      color: #f5f5f7;
      letter-spacing: -0.01em;
    }

    .nav-social {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav-social a {
      color: rgba(255, 255, 255, 0.7);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 0.25s ease;
    }

    .nav-social a:hover { color: #fff; }

    .nav-social svg,
    .nav-social img {
      width: 18px;
      height: 18px;
      display: block;
    }

    .nav-social img {
      filter: invert(1);
      opacity: 0.7;
      transition: opacity 0.25s ease;
    }

    .nav-social a:hover img { opacity: 1; }

    /* ======= PAGE HEADER ======= */
    .page-header {
      max-width: 960px;
      margin: 0 auto;
      padding: 140px 24px 48px;
      text-align: left;
    }

    .page-header h1 {
      font-size: clamp(40px, 6vw, 64px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: #fff;
      margin-bottom: 16px;
    }

    .page-header p {
      font-size: 19px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 400;
      letter-spacing: -0.01em;
      max-width: 640px;
    }

    .divider {
      max-width: 960px;
      margin: 0 auto 64px;
      border: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    /* ======= CARD GRID ======= */
    .grid {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px 120px;
      display: block;
    }

    .card,
    .post-card {
      display: grid;
      grid-template-columns: 280px 1fr;
      background: #161616;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 24px;
      border: 1px solid transparent;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .card:hover,
    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .card-cover {
      display: block;
      position: relative;
      overflow: hidden;
      min-height: 200px;
    }

    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      min-height: 200px;
    }

    .card-cover-placeholder,
    .cover-placeholder {
      width: 100%;
      height: 100%;
      min-height: 200px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.08);
      letter-spacing: -0.02em;
    }

    .card-body,
    .card-content {
      padding: 32px;
      display: flex;
      flex-direction: column;
    }

    .card-preview p { margin: 0; }

    .fade-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 64px;
      background: linear-gradient(transparent, #161616);
      pointer-events: none;
    }

    .continue-reading {
      margin-top: 20px;
      color: #2997ff;
      font-weight: 500;
      font-size: 15px;
      align-self: flex-start;
      transition: color 0.25s ease;
    }

    .continue-reading:hover { color: #fff; }

    .date-pill {
      display: inline-block;
      align-self: flex-start;
      border-radius: 980px;
      background: rgba(255, 255, 255, 0.06);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 16px;
      font-weight: 500;
    }

    .card-title {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1.35;
      margin-bottom: 8px;
      transition: color 0.25s ease;
    }

    .card-title:hover { color: #2997ff; }

    .card-subtitle {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.45);
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .card-preview {
      position: relative;
      max-height: 96px;
      overflow: hidden;
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.6);
    }

    .card-preview::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 64px;
      background: linear-gradient(transparent, #161616);
      pointer-events: none;
    }

    .read-more {
      margin-top: 20px;
      color: #2997ff;
      font-weight: 500;
      font-size: 15px;
      align-self: flex-start;
      transition: color 0.25s ease;
    }

    .read-more:hover { color: #fff; }

    /* ======= SKELETON ======= */
    .skeleton {
      display: grid;
      grid-template-columns: 280px 1fr;
      background: #161616;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 24px;
      border: 1px solid transparent;
    }

    .skeleton-cover,
    .skeleton-line {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 6px;
    }

    .skeleton-cover {
      min-height: 200px;
      border-radius: 0;
    }

    .skeleton-body {
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .skeleton-pill {
      width: 80px;
      height: 20px;
      border-radius: 980px;
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
      margin-bottom: 4px;
    }

    .skeleton-line.title { height: 22px; width: 85%; }
    .skeleton-line.subtitle { height: 15px; width: 60%; }
    .skeleton-line.preview { height: 14px; width: 100%; }
    .skeleton-line.preview.short { width: 75%; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ======= FADE IN ======= */
    .fade-in-section {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .fade-in-section.is-visible {
      opacity: 1;
      transform: none;
    }

    .fade-in-section:nth-child(1) { transition-delay: 0s; }
    .fade-in-section:nth-child(2) { transition-delay: 0.08s; }
    .fade-in-section:nth-child(3) { transition-delay: 0.16s; }
    .fade-in-section:nth-child(4) { transition-delay: 0.24s; }
    .fade-in-section:nth-child(5) { transition-delay: 0.32s; }
    .fade-in-section:nth-child(6) { transition-delay: 0.40s; }

    /* ======= ERROR ======= */
    .error-state {
      text-align: center;
      padding: 48px 24px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 16px;
    }

    .error-state a {
      color: #2997ff;
      font-weight: 500;
      transition: color 0.25s ease;
    }

    .error-state a:hover { color: #fff; }

    /* ======= FOOTER ======= */
    .footer {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 13px;
    }

    .footer-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .footer-social a {
      color: rgba(255, 255, 255, 0.4);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 0.25s ease;
    }

    .footer-social a:hover { color: #fff; }

    .footer-social svg,
    .footer-social img {
      width: 18px;
      height: 18px;
      display: block;
    }

    .footer-social img {
      filter: invert(1);
      opacity: 0.4;
      transition: opacity 0.25s ease;
    }

    .footer-social a:hover img { opacity: 1; }

    /* ======= MOBILE ======= */
    @media (max-width: 680px) {
      .card,
      .post-card,
      .skeleton {
        grid-template-columns: 1fr;
      }

      .card-cover,
      .card-cover img,
      .card-cover-placeholder,
      .cover-placeholder,
      .skeleton-cover {
        min-height: 180px;
      }

      .card-body,
      .card-content,
      .skeleton-body {
        padding: 24px;
      }

      .page-header {
        padding: 120px 24px 40px;
      }

      .divider {
        margin: 0 auto 48px;
      }

      .card-title {
        font-size: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      .skeleton-cover,
      .skeleton-line,
      .skeleton-pill {
        animation: none;
      }

      .fade-in-section {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const grid = document.getElementById('posts-grid');
      const FEED = 'https://gianninspire.substack.com/feed';
      const PROXY_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(FEED);

      fetch(PROXY_URL)
        .then(function(res) {
          if (!res.ok) throw new Error('Network response was not ok: ' + res.status);
          return res.text();
        })
        .then(function(str) {
          const parser = new DOMParser();
          const xml = parser.parseFromString(str, 'application/xml');
          const items = Array.from(xml.querySelectorAll('item'));
          if (!items.length) throw new Error('No items found in feed');
          grid.innerHTML = '';

          items.forEach(function(item, index) {
            const title   = item.querySelector('title')?.textContent || '';
            const link    = item.querySelector('link')?.nextSibling?.nodeValue?.trim()
                            || item.querySelector('link')?.textContent || '#';
            const pubDate = item.querySelector('pubDate')?.textContent || '';

            // Cover: try <media:content url="..."> then first <img> in description
            const mediaEl = item.getElementsByTagNameNS('*', 'content')[0];
            let cover = mediaEl ? mediaEl.getAttribute('url') : null;
            if (!cover) {
              const tempDiv = document.createElement('div');
              tempDiv.innerHTML = item.querySelector('description')?.textContent || '';
              const firstImg = tempDiv.querySelector('img');
              cover = firstImg ? firstImg.src : null;
            }

            // Strip HTML, truncate 150 words
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = item.querySelector('description')?.textContent || '';
            const plainText = (tempDiv.textContent || tempDiv.innerText || '')
              .replace(/\s+/g, ' ').trim();
            const words = plainText.split(' ');
            const preview = words.slice(0, 150).join(' ') + (words.length > 150 ? '…' : '');

            // Format date
            const dateObj = new Date(pubDate);
            const dateStr = dateObj.toLocaleDateString('en-US', {
              year: 'numeric', month: 'long', day: 'numeric'
            });

            const delay = Math.min(index, 5) * 0.08;

            const coverHTML = cover
              ? `<img src="${cover}" alt="${title}" loading="lazy">`
              : `<div class="cover-placeholder"><span>G</span></div>`;

            const cardHTML = `
              <article class="post-card fade-in-section" style="transition-delay:${delay}s">
                <a class="card-cover" href="${link}" target="_blank" rel="noopener">
                  ${coverHTML}
                </a>
                <div class="card-content">
                  <span class="date-pill">${dateStr}</span>
                  <a class="card-title" href="${link}" target="_blank" rel="noopener">${title}</a>
                  <div class="card-preview">
                    <p>${preview}</p>
                    <div class="fade-overlay"></div>
                  </div>
                  <a class="continue-reading" href="${link}" target="_blank" rel="noopener">Continue reading →</a>
                </div>
              </article>`;

            grid.insertAdjacentHTML('beforeend', cardHTML);
          });

          // Kick off IntersectionObserver after cards are rendered
          initObserver();
        })
        .catch(function(err) {
          console.error('Feed fetch error:', err);
          grid.innerHTML = `
            <div class="error-state">
              Couldn't load posts.
              <a href="https://gianninspire.substack.com" target="_blank" rel="noopener">
                Read directly on Substack.
              </a>
            </div>`;
        });

      function initObserver() {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          document.querySelectorAll('.fade-in-section').forEach(el => {
            el.classList.add('is-visible');
          });
          return;
        }
        const observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.12 });

        document.querySelectorAll('.fade-in-section').forEach(el => observer.observe(el));
      }
    });
  </script>

</body>
</html>
